# yolo_mouse configuration

# --- model ---
model         = model.onnx     ; path to your YOLOv10 .onnx file
inputSize     = 640            ; must match the model export size
confThreshold = 0.35           ; minimum detection confidence (0..1)
targetClass   = -1             ; -1 = any class, or a specific class id

# --- capture region (screen pixels) ---
# Leave regionW / regionH at 0 to capture the full primary screen.
regionX = 0
regionY = 0
regionW = 0
regionH = 0

# --- output backend ---
# windows = drive the OS cursor with SendInput
# serial  = send moves to the RP2040 / RP2350 firmware
outputMode = windows

# --- serial backend settings ---
comPort = COM3
baud    = 115200

# --- movement tuning ---
smoothing = 0.35   ; fraction of remaining distance moved per frame (0..1)
gain      = 1.0    ; extra multiplier on the move delta
deadzone  = 2      ; px; stop moving once this close to the target

# start with tracking OFF (press F2 to enable). 0 = start ON.
toggleStart = 1
